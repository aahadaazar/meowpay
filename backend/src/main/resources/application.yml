server:
  port: ${PORT:8080}

spring:
  application:
    name: meowpay
  datasource:
    url: ${SUPABASE_DB_URL:}

app:
  security:
    jwt:
      secret: ${SUPABASE_JWT_SECRET:}
      jwk-set-uri: ${SUPABASE_JWT_JWK_SET_URI:}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}
  topup:
    max: ${TOPUP_MAX:1000}
  groq:
    api-key: ${GROQ_API_KEY:}
    insight-model: ${GROQ_INSIGHT_MODEL:llama-3.3-70b-versatile}
