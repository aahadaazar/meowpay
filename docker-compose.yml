services:
  backend:
    build:
      context: ./backend
      target: development
    working_dir: /workspace
    env_file:
      - ${MEOWPAY_ENV_FILE:-.env}
    environment:
      CORS_ALLOWED_ORIGIN: http://localhost:3000
      GRADLE_USER_HOME: /gradle-cache
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/workspace
      - gradle_cache:/gradle-cache

  frontend:
    build:
      context: ./frontend
      target: development
    working_dir: /workspace
    env_file:
      - ${MEOWPAY_ENV_FILE:-.env}
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
      - frontend_next:/workspace/.next
    depends_on:
      - backend

volumes:
  gradle_cache:
  frontend_node_modules:
  frontend_next:
